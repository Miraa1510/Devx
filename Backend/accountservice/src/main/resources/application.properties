spring.application.name=accountservice
server.port=8901
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DATABASE:Bankingsystem}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/


eureka.instance.prefer-ip-address=true
logging.level.root=DEBUG
